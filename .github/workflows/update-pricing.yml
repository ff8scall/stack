name: Update Pricing Data

on:
  schedule:
    - cron: '0 0 * * *' # 매일 자정 (UTC) 실행
  workflow_dispatch: # 수동 실행 허용

jobs:
  update-pricing:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Scrapers and Update Data
        run: node scripts/scraper/run_all.js

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/data/bricks.ts
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update pricing data [skip ci]" && git push)

      - name: Notify IndexNow
        run: |
          curl -X GET "https://stack.lego-sia.com/api/indexnow?secret=083642cc731a4b27909fef930cda8a90"
